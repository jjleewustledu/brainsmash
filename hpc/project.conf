# shellcheck shell=bash
# hpc/project.conf — per-project values consumed by hpc/* and hooks/*.
#
# This file was generated by ~/.claude/hpc-toolkit/install.sh. Bash
# key=value format is the single source of truth for the
# hpc-toolkit-using project's identity. Sourced near the top of
# hpc/config.sh; hooks source it independently via
# $(git rev-parse --show-toplevel)/hpc/project.conf.
#
# Override semantics: every value uses ${VAR:-default} so an operator
# can override at the call site by exporting the variable before invoking
# the script (e.g. `FANOUT_REMOTES=chpc bash hpc/fanout_main.sh`). The
# conf values are project-fixed defaults; the env always wins.
#
# shellcheck disable=SC2034

# --- identity -----------------------------------------------------------------
# PROJECT_NAME   : git repo dirname (and the suffix used when push.sh's
#                  --project flag is supplied).
# CONDA_ENV      : base conda env name.
# DEFAULT_BRANCH : the branch push.sh / fanout_main.sh / pre-push diff against.
# DOTFOLDER      : per-project state dir under $HOME. Used for locks and logs.
# PYTHON_PKG     : importable top-level Python package (usually PROJECT_NAME
#                  with hyphens → underscores).
PROJECT_NAME="${PROJECT_NAME:-brainsmash}"
CONDA_ENV="${CONDA_ENV:-brainsmash}"
DEFAULT_BRANCH="${DEFAULT_BRANCH:-master}"
DOTFOLDER="${DOTFOLDER:-${HOME}/.brainsmash}"
PYTHON_PKG="${PYTHON_PKG:-brainsmash}"

# --- CI substrate -------------------------------------------------------------
# GH_REPO        : <owner>/<repo> form. Must match the GitHub repo backing
#                  the `origin` remote. Required.
# SINGLE_CLUSTER : when non-empty, ci_pr.sh skips queue-depth load balancing
#                  and submits to the named cluster ("chpc" or "ris") only.
# BRANCH_PROTECTION_CONTEXT : commit-status context name posted by ci_pr.sbatch.
# TEST_CMD       : pytest invocation that ci_pr.sbatch runs as the CPU shard.
# TEST_CMD_GPU   : optional GPU-shard test command. Empty disables the shard.
GH_REPO="${GH_REPO:-jjleewustledu/brainsmash}"
SINGLE_CLUSTER="${SINGLE_CLUSTER:-chpc}"
BRANCH_PROTECTION_CONTEXT="${BRANCH_PROTECTION_CONTEXT:-hpc-ci}"
TEST_CMD="${TEST_CMD:-pytest tests/ -q}"
TEST_CMD_GPU="${TEST_CMD_GPU:-}"

# --- fanout topology ----------------------------------------------------------
# FANOUT_REMOTES : space-separated list of git remotes that fanout_main.sh
#                  pushes the default branch to. Any not configured locally
#                  is silently skipped.
FANOUT_REMOTES="${FANOUT_REMOTES:-chpc}"
