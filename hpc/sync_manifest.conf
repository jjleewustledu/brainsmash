# brainsmash sync manifest
#
# FORMAT: TYPE|LOCAL_PATH|REMOTE_PATH|BRANCH
#
# TYPE    = git      → git push <hpc-remote> + post-receive checkout
#           git_glob → expand glob locally, git push each match
#           rsync    → rsync only (no git)
#
# BRANCH  = branch to push (per-repo; "auto" → current branch)
# Remote paths use ${HPC_PROJECTS} — resolved at runtime by push.sh
# from hpc/config.sh (which selects chpc).
#
# Single-cluster project (CHPC only); see hpc/project.conf SINGLE_CLUSTER.
# DOTFOLDER ~/.brainsmash is shared with sibling brainsmash projects
# (brainsmash-adapter, brainsmash-analysis, brainsmash-inference). It's
# intentionally rsync'd alongside the git push so per-project state stays
# in lock-step with the source.
#
# This is the jjleewustledu/brainsmash fork of murraylab/brainsmash. The
# `upstream` remote points at the original; toolkit sync targets only the
# fork (CHPC bare repo + GitHub origin). Default branch: master.

git|~/PycharmProjects/brainsmash|${HPC_PROJECTS}/brainsmash|master
rsync|~/.brainsmash|~/.brainsmash
